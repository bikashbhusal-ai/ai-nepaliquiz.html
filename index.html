        const TIMER_SECONDS = 120;

        function NepaliQuiz() {
          const [sets, setSets] = useState(null);
          const [loading, setLoading] = useState(true);
          const [error, setError] = useState(null);
          const [currentSetIndex, setCurrentSetIndex] = useState(0);
          const [answers, setAnswers] = useState({});
          const [checked, setChecked] = useState(false);
          const [score, setScore] = useState(0);
          const [timeLeft, setTimeLeft] = useState(TIMER_SECONDS);
          const [importOpen, setImportOpen] = useState(false);
          const [importText, setImportText] = useState("");
          const [importError, setImportError] = useState("");
          const [draggingWord, setDraggingWord] = useState(null);
          const [dragOverSlot, setDragOverSlot] = useState(null);
          const [history, setHistory] = useState([]);
          const [reviewIndex, setReviewIndex] = useState(null);
          const timerRef = useRef(null);

          const currentSet = sets?.sets?.[currentSetIndex];
          const wordBank = currentSet?.wordBank || [];
          const reviewEntry = reviewIndex !== null ? history[reviewIndex] : null;
          const displaySet = reviewEntry ? sets.sets[reviewEntry.setIndex] : currentSet;
          const displayAnswers = reviewEntry ? reviewEntry.answers : answers;
          const isReviewing = reviewIndex !== null;

          const resetForSet = useCallback(() => {
            setAnswers({});
            setChecked(false);
            setTimeLeft(TIMER_SECONDS);
            setDraggingWord(null);
            setDragOverSlot(null);
            setReviewIndex(null);
          }, []);

          const handleCheck = useCallback(() => {
            if (!currentSet || checked) return;
            let gained = 0;
            currentSet.questions.forEach((q, i) => {
              if ((answers[i] || "").trim().toLowerCase() === q.answer.trim().toLowerCase()) gained += 10;
            });
            setScore((s) => s + gained);
            setChecked(true);
            setHistory((h) => [...h, { setIndex: currentSetIndex, answers: { ...answers }, gained }]);
          }, [currentSet, answers, checked, currentSetIndex]);

          const playBeep = useCallback(() => {
            try {
              const ctx = new (window.AudioContext || window.webkitAudioContext)();
              [880, 1100, 1320].forEach((freq, i) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.type = "sine"; osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.6, ctx.currentTime + i * 0.25);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.25 + 0.2);
                osc.start(ctx.currentTime + i * 0.25);
                osc.stop(ctx.currentTime + i * 0.25 + 0.2);
              });
            } catch(e) {}
          }, []);

          useEffect(() => {
            if (isReviewing) return;
            if (timeLeft <= 0) { handleCheck(); return; }
            if (timeLeft === 3) { playBeep(); }
            timerRef.current = setTimeout(() => setTimeLeft((t) => t - 1), 1000);
            return () => clearTimeout(timerRef.current);
          }, [timeLeft, handleCheck, isReviewing, playBeep]);

          useEffect(() => {
            setSets(FALLBACK_SETS);
            setLoading(false);
          }, []);

          const handleNextSet = () => {
            if (!sets) return;
            setCurrentSetIndex((i) => (i + 1) % sets.sets.length);
            resetForSet();
          };

          const handlePrevSet = () => {
            if (!sets) return;
            setCurrentSetIndex((i) => (i - 1 + sets.sets.length) % sets.sets.length);
            resetForSet();
          };

          const handleImport = () => {
            try {
              const parsed = JSON.parse(importText);
              if (!parsed.sets || !Array.isArray(parsed.sets)) throw new Error();
              setSets(parsed);
              setCurrentSetIndex(0);
              resetForSet();
              setHistory([]);
              setImportOpen(false);
              setImportText("");
              setImportError("");
            } catch {
              setImportError("अमान्य JSON ढाँचा।");
            }
          };

          const formatTime = (secs) => {
            const m = String(Math.floor(secs/60)).padStart(2,"0");
            const s = String(secs%60).padStart(2,"0");
            return `${m}:${s}`;
          };

          const usedWordMap = {};
          if (!isReviewing) {
            Object.keys(answers).forEach((k) => { if (answers[k]) usedWordMap[answers[k]] = parseInt(k); });
          }

          const handleDragStartWord = (word, fromSlot) => { setDraggingWord({word, fromSlot: fromSlot ?? null}); };
          const handleDropOnSlot = (slotIndex) => {
            if (!draggingWord || isReviewing) return;
            const {word, fromSlot} = draggingWord;
            setAnswers((prev) => {
              const next = {...prev};
              if (fromSlot !== null && fromSlot !== undefined) delete next[fromSlot];
              next[slotIndex] = word;
              return next;
            });
            setDraggingWord(null); setDragOverSlot(null);
          };
          const handleDropOnBank = () => {
            if (!draggingWord || isReviewing) { setDraggingWord(null); return; }
            const {fromSlot} = draggingWord;
            if (fromSlot !== null && fromSlot !== undefined) {
              setAnswers((prev) => { const n={...prev}; delete n[fromSlot]; return n; });
            }
            setDraggingWord(null); setDragOverSlot(null);
          };
          const handleClearSlot = (slotIndex) => {
            if (isReviewing) return;
            setAnswers((prev) => { const n={...prev}; delete n[slotIndex]; return n; });
          };
          const handleTypeInSlot = (slotIndex, val) => {
            if (!val || isReviewing) return;
            setAnswers((prev) => ({...prev, [slotIndex]: val}));
          };

          const getSlotColors = (i, forAnswers, forSet) => {
            const isCheckedState = isReviewing || checked;
            if (!isCheckedState) return {bg:"#f0fdf0", border:"#86efac", textColor:"#15803d"};
            const q = forSet.questions[i];
            const correct = (forAnswers[i]||"").trim().toLowerCase() === q.answer.trim().toLowerCase();
            return correct
              ? {bg:"#bbf7d0", border:"#16a34a", textColor:"#15803d"}
              : {bg:"#fee2e2", border:"#dc2626", textColor:"#dc2626"};
          };

          const goToPrev = () => {
            if (history.length === 0) return;
            setReviewIndex(history.length - 1);
          };
          const exitReview = () => { setReviewIndex(null); };
          const reviewPrev = () => { if (reviewIndex > 0) setReviewIndex(reviewIndex - 1); };
          const reviewNext = () => { if (reviewIndex < history.length - 1) setReviewIndex(reviewIndex + 1); };

          if (loading) return (
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#f8fafc",fontFamily:"'Noto Sans Devanagari','Arial Unicode MS',sans-serif"}}>
              <div style={{fontSize:48,marginBottom:20,animation:"spin 1s linear infinite"}}>⏳</div>
              <div style={{fontSize:20,color:"#6366f1",fontWeight:"bold"}}>प्रश्नहरू तयार गर्दै...</div>
              <style>{`@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}`}</style>
            </div>
          );

          const shownSet = displaySet;
          const shownAnswers = displayAnswers;
          const isCheckedMode = isReviewing || checked;

          return (
            <div style={{height:"100vh",background:"linear-gradient(135deg,#e0e7ff 0%,#f0fdf4 100%)",fontFamily:"'Noto Sans Devanagari','Arial Unicode MS',sans-serif",display:"flex",flexDirection:"column",overflow:"hidden"}}>
              <div style={{maxWidth:850,margin:"0 auto",width:"100%",display:"flex",flexDirection:"column",height:"100%",padding:"10px 12px 6px"}}>
                <div style={{textAlign:"center",marginBottom:8}}>
                  <h1 style={{fontSize:22,fontWeight:900,color:"#3730a3",margin:0}}>📚 नेपाली भाषा र अङ्ग्रेजी भाषा प्रश्नोत्तरी</h1>
                  <div style={{fontSize:13,color:"#6b7280",marginTop:3}}>
                    {isReviewing
                      ? <span style={{color:"#f59e0b",fontWeight:700}}>👁 समीक्षा मोड – सेट {sets.sets[reviewEntry.setIndex]?.id} | {sets.sets[reviewEntry.setIndex]?.title}</span>
                      : <>{shownSet?.title} &nbsp;|&nbsp; सेट {currentSetIndex+1} / {sets?.sets?.length||1}</>
                    }
                  </div>
                </div>

                {error && <div style={{background:"#fef9c3",border:"1px solid #fde047",borderRadius:8,padding:"8px 14px",marginBottom:8,fontSize:13,color:"#854d0e"}}>⚠️ {error}</div>}

                {/* Score & Timer Area */}
                <div style={{background:"#fff",borderRadius:16,padding:"6px 24px",marginBottom:6,boxShadow:"0 2px 16px rgba(0,0,0,0.08)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>

                  {/* Left Side: Timer - left column center */}
                  <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flex:1}}>
                    <div style={{fontSize:13,color:"#6366f1",fontWeight:900,marginBottom:2,letterSpacing:1}}>⏳ समय बाँकी</div>
                    <div style={{fontWeight:900,fontSize:40,color:(!isReviewing&&timeLeft<=3)?"#dc2626":(!isReviewing&&timeLeft<30)?"#f59e0b":"#1e293b",fontFamily:"monospace",lineHeight:1,textShadow:(!isReviewing&&timeLeft<=3)?"0 0 20px rgba(220,38,38,0.5)":"none",transition:"color 0.3s",fontSize:40}}>
                      {isReviewing ? "समीक्षा" : `${formatTime(timeLeft)}`}
                    </div>
                  </div>

                  <div style={{width:2,height:50,background:"linear-gradient(to bottom,transparent,#c7d2fe,transparent)",flexShrink:0}}></div>

                  {/* Right Side: Score - right column center */}
                  <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flex:1}}>
                    <div style={{fontSize:13,color:"#6366f1",fontWeight:900,marginBottom:2,letterSpacing:1}}>🏆 प्राप्त अङ्क</div>
                    <div style={{background:"linear-gradient(135deg,#6366f1,#818cf8)",color:"#fff",borderRadius:16,padding:"3px 36px",fontWeight:900,fontSize:40,textAlign:"center",lineHeight:1,boxShadow:"0 6px 20px rgba(99,102,241,0.4)"}}>
                      {score}
                    </div>
                  </div>
                </div>

                {isReviewing && (
                  <div style={{background:"#fef3c7",border:"1px solid #fcd34d",borderRadius:10,padding:"8px 16px",marginBottom:0,display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
                    <button onClick={reviewPrev} disabled={reviewIndex===0} style={{background:reviewIndex===0?"#e5e7eb":"#f59e0b",color:reviewIndex===0?"#9ca3af":"#fff",border:"none",borderRadius:6,padding:"4px 14px",fontWeight:700,cursor:reviewIndex===0?"default":"pointer",fontFamily:"inherit"}}>◀ अघिल्लो</button>
                    <span style={{fontSize:13,color:"#92400e",fontWeight:600}}>
                      इतिहास {reviewIndex+1} / {history.length} &nbsp;|&nbsp; प्राप्त अङ्क: <strong>{reviewEntry?.gained||0}</strong>
                    </span>
                    <button onClick={reviewNext} disabled={reviewIndex===history.length-1} style={{background:reviewIndex===history.length-1?"#e5e7eb":"#f59e0b",color:reviewIndex===history.length-1?"#9ca3af":"#fff",border:"none",borderRadius:6,padding:"4px 14px",fontWeight:700,cursor:reviewIndex===history.length-1?"default":"pointer",fontFamily:"inherit"}}>अर्को ▶</button>
                  </div>
                )}

                {/* === SCROLLABLE AREA === */}
                <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:8}}>

                {/* Questions Area */}
                <div style={{background:"#fff",borderRadius:16,padding:"16px 28px",marginBottom:0,boxShadow:"0 2px 16px rgba(99,102,241,0.10)"}}>
                  {shownSet?.questions.map((q,i) => {
                    const parts = q.questionText.split("___");
                    const {bg,border,textColor} = getSlotColors(i,shownAnswers,shownSet);
                    const placed = shownAnswers[i];
                    const isWrong = isCheckedMode && placed && placed.trim().toLowerCase() !== q.answer.trim().toLowerCase();
                    const isOver = dragOverSlot===i && !isReviewing;

                    return (
                      <div key={i} style={{marginBottom:i<shownSet.questions.length-1?28:0, fontSize:22, lineHeight:1.8, display:"flex", alignItems:"center", flexWrap:"wrap", gap:6}}>
                        <span style={{fontWeight:900,color:"#312e81",marginRight:6}}>{q.label})</span>
                        <span style={{color:"#4f46e5",fontSize:14,marginRight:6,background:"#eef2ff",borderRadius:6,padding:"2px 8px", fontWeight: 700}}>{q.type}</span>
                        <span style={{fontWeight: 500}}>{parts[0]}</span>
                        <span
                          onDragOver={(e)=>{ e.preventDefault(); if(!isReviewing) setDragOverSlot(i); }}
                          onDragLeave={()=>setDragOverSlot(null)}
                          onDrop={()=>handleDropOnSlot(i)}
                          style={{
                            display:"inline-flex",alignItems:"center",justifyContent:"center",
                            minWidth:140,height:44,verticalAlign:"middle",
                            background:isOver?"#e0e7ff":(placed?bg:"#f0fdf4"),
                            border:`2px ${placed?"solid":"dashed"} ${isOver?"#6366f1":border}`,
                            borderRadius:10,margin:"0 6px",transition:"all 0.15s",
                            position:"relative",boxShadow:isOver?"0 0 0 4px #c7d2fe":"none",
                          }}
                        >
                          {placed ? (
                            <>
                              <span
                                draggable={!isCheckedMode}
                                onDragStart={()=>!isCheckedMode && handleDragStartWord(placed,i)}
                                style={{fontWeight:900,color:textColor,fontSize:20,cursor:isCheckedMode?"default":"grab",userSelect:"none",padding:"0 28px 0 10px"}}
                              >{placed}</span>
                              {!isCheckedMode && (
                                <span onClick={()=>handleClearSlot(i)}
                                  style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",fontSize:14,color:"#9ca3af",cursor:"pointer"}}>✕</span>
                              )}
                            </>
                          ) : (
                            !isCheckedMode && (
                              <input
                                onKeyDown={(e)=>{ if(e.key==="Enter"&&e.target.value.trim()){ handleTypeInSlot(i,e.target.value.trim()); e.target.value=""; }}}
                                placeholder="टाइप / तान्नुस्"
                                disabled={isCheckedMode}
                                style={{background:"transparent",border:"none",outline:"none",fontSize:15,width:110,textAlign:"center",fontFamily:"inherit",color:"#6b7280", fontWeight: 600}}
                              />
                            )
                          )}
                          {isCheckedMode && !placed && (
                            <span style={{fontSize:16,color:"#9ca3af",padding:"0 10px"}}>—</span>
                          )}
                        </span>
                        {parts[1] && <span style={{fontWeight: 500}}>{parts[1]}</span>}
                        {isWrong && <span style={{fontSize:16,color:"#16a34a",marginLeft:10,fontWeight:900,whiteSpace:"nowrap", background: '#f0fdf4', padding: '2px 8px', borderRadius: '6px', border: '1px solid #bbf7d0'}}>✓ {q.answer}</span>}
                      </div>
                    );
                  })}
                </div>

                {!isReviewing && (
                  <div
                    onDragOver={(e)=>e.preventDefault()}
                    onDrop={handleDropOnBank}
                    style={{background:"#f8fafc",border:"2px dashed #c7d2fe",borderRadius:16,padding:"12px 20px",marginBottom:0}}
                  >
                    <div style={{fontSize:13,color:"#6366f1",fontWeight:800,marginBottom:12,letterSpacing:0.8,textTransform:"uppercase"}}>
                      🗂 शब्द भण्डार — तानेर माथि राख्नुहोस्
                    </div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:12}}>
                      {wordBank.map((word,wi) => {
                        const isUsed = word in usedWordMap;
                        return (
                          <div key={wi}
                            draggable={!isUsed&&!isCheckedMode}
                            onDragStart={()=>!isUsed&&!isCheckedMode&&handleDragStartWord(word,null)}
                            style={{
                              background:isUsed?"#e5e7eb":"#6366f1",
                              color:isUsed?"#9ca3af":"#fff",
                              padding:"10px 24px",borderRadius:24,fontSize:18,fontWeight:700,
                              cursor:isUsed||isCheckedMode?"not-allowed":"grab",
                              userSelect:"none",opacity:isUsed?0.45:1,
                              transition:"all 0.2s",
                              boxShadow:isUsed?"none":"0 4px 10px rgba(99,102,241,0.3)",
                              textDecoration:isUsed?"line-through":"none",
                            }}
                          >{word}</div>
                        );
                      })}
                    </div>
                  </div>
                )}

                </div> {/* end scrollable */}

                {isReviewing ? (
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:6}}>
                    <button onClick={exitReview} style={{background:"#6366f1",color:"#fff",border:"none",borderRadius:12,height:44,fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>⬅ हालको सेटमा फर्कनुहोस्</button>
                    <button onClick={handleNextSet} style={{background:"#16a34a",color:"#fff",border:"none",borderRadius:12,height:44,fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>⏭ अर्को सेट</button>
                  </div>
                ) : (
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8,marginTop:6}}>
                    <button onClick={handleCheck} disabled={checked} style={{background:checked?"#86efac":"#16a34a",color:"#fff",border:"none",borderRadius:12,height:44,fontWeight:700,fontSize:13,cursor:checked?"default":"pointer",fontFamily:"inherit"}}>✅ जाँच गर्नुहोस्</button>
                    <button onClick={handlePrevSet} style={{background:"#f59e0b",color:"#fff",border:"none",borderRadius:12,height:44,fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>🔙 पूर्व सेट</button>
                    <button onClick={handleNextSet} style={{background:"#6366f1",color:"#fff",border:"none",borderRadius:12,height:44,fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>⏭ अर्को सेट</button>
                    <button onClick={()=>setImportOpen(true)} style={{background:"#374151",color:"#fff",border:"none",borderRadius:12,height:44,fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>📋 इम्पोर्ट</button>
                  </div>
                )}
                <div style={{textAlign:"center",fontSize:12,color:"#64748b",marginTop:4,fontWeight:600}}>© विकाश भुसाल (BIKASH BHUSAL)</div>
              </div>

              {importOpen && (
                <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:16, backdropFilter: 'blur(4px)'}}>
                  <div style={{background:"#fff",borderRadius:20,padding:32,width:"100%",maxWidth:500,boxShadow:"0 12px 50px rgba(0,0,0,0.3)"}}>
                    <h2 style={{margin:"0 0 16px",fontSize:20,color:"#1e293b",fontFamily:"inherit", fontWeight: 800}}>📋 प्रश्न इम्पोर्ट गर्नुहोस्</h2>
                    <textarea value={importText} onChange={(e)=>setImportText(e.target.value)} rows={8} style={{width:"100%",borderRadius:12,border:"2px solid #e5e7eb",padding:14,fontSize:14,fontFamily:"monospace",resize:"vertical",boxSizing:"border-box", outline: 'none', focus: {borderColor: '#6366f1'}}} placeholder='{"sets":[...]}' />
                    {importError && <div style={{color:"#dc2626",fontSize:14,marginTop:8, fontWeight: 600}}>{importError}</div>}
                    <div style={{display:"flex",gap:12,marginTop:20}}>
                      <button onClick={handleImport} style={{flex:1,background:"#6366f1",color:"#fff",border:"none",borderRadius:10,height:48,fontWeight:700,fontSize:16,cursor:"pointer",fontFamily:"inherit"}}>इम्पोर्ट</button>
                      <button onClick={()=>{setImportOpen(false);setImportError("");setImportText("");}} style={{flex:1,background:"#f1f5f9",color:"#374151",border:"none",borderRadius:10,height:48,fontWeight:700,fontSize:16,cursor:"pointer",fontFamily:"inherit"}}>रद्द</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<NepaliQuiz />);
    </script>
</body>
</html>
